name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Vitest
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build registry
        run: pnpm registry:build

      - name: Verify registry drift
        run: pnpm registry:drift
